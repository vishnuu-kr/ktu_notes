name: Generate Premium KTU Notes (Matrix Architecture)

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to process (e.g. CS,CE or ALL)'
        required: false
        default: 'ALL'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    # Allows the script to run up to 6 hours
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        semester: [1, 2, 3, 4, 5]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Setup API Keys
        # The MINIMAX_API_KEYS secret must be comma-separated
        run: |
          echo "${{ secrets.MINIMAX_API_KEYS }}" > miniall.txt
          
      - name: Run Notes Generation Engine
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -u generate_premium_notes.py --branch "${{ github.event.inputs.branches }}" --semester "${{ matrix.semester }}"
          
      - name: Commit and Push to Isolated Branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          BRANCH_NAME="auto-notes-sem-${{ matrix.semester }}"
          
          # Save the newly generated files to a temp directory
          mkdir -p /tmp/updated_data
          cp src/data/subjects/*-${{ matrix.semester }}.json /tmp/updated_data/
          
          # Fetch origin and switch to the target branch
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            git checkout $BRANCH_NAME
            git pull origin $BRANCH_NAME
          else
            git checkout -b $BRANCH_NAME
          fi
          
          # Copy the updated data back to the workspace
          cp /tmp/updated_data/* src/data/subjects/
          
          # Commit and push changes
          git add src/data/subjects/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Generation: Semester ${{ matrix.semester }}" && git push -u origin $BRANCH_NAME)
