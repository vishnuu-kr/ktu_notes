name: "Generate Notes V2 (High-Speed Matrix)"

on:
  workflow_dispatch:
    inputs:
      semesters:
        description: 'Semesters to process (comma-separated, e.g. "1,2,3,4,5,6,7,8")'
        required: false
        default: '1,2,3,4,5,6,7,8'
      branches:
        description: 'Branches to process (e.g. cs,ce,ec,ee,me or ALL)'
        required: false
        default: 'ALL'
      max_per_key:
        description: 'Max concurrent requests per API key PER RUNNER (1=safe, 2=moderate, 3=aggressive). With 10 runners, effective per-key load = this × 10'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  # ─── Build the dynamic matrix ─────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build Matrix
        id: set-matrix
        run: |
          SEMESTERS="${{ github.event.inputs.semesters }}"
          
          # Chunks = parallel runners per semester. MORE runners = more source
          # IPs, each holding only ~5 concurrent connections (the stable limit
          # that avoids RemoteDisconnected retry storms). This is how we scale
          # throughput safely — NOT by raising per-runner concurrency.
          # Heavy semesters get more chunks. GitHub max-parallel is 20.
          # Sem 1:   894 topics → 1 chunk
          # Sem 2:  2570 topics → 2 chunks
          # Sem 3:  5331 topics → 3 chunks
          # Sem 4: 10016 topics → 5 chunks
          # Sem 5: 12834 topics → 6 chunks
          # Sem 6: 15246 topics → 7 chunks
          # Sem 7: 16978 topics → 7 chunks
          # Sem 8: 10800 topics → 5 chunks
          # (Resume-aware: already-generated topics are skipped, so a re-run only
          #  fills gaps and finishes much faster than these raw counts suggest.)
          
          MATRIX_JSON='{"include":['
          FIRST=true
          
          IFS=',' read -ra SEMS <<< "$SEMESTERS"
          for SEM in "${SEMS[@]}"; do
            SEM=$(echo "$SEM" | tr -d ' ')
            case $SEM in
              1) CHUNKS=1 ;;
              2) CHUNKS=2 ;;
              3) CHUNKS=3 ;;
              4) CHUNKS=5 ;;
              5) CHUNKS=6 ;;
              6) CHUNKS=7 ;;
              7) CHUNKS=7 ;;
              8) CHUNKS=5 ;;
              *) CHUNKS=1 ;;
            esac
            
            for ((C=0; C<CHUNKS; C++)); do
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                MATRIX_JSON+=','
              fi
              MATRIX_JSON+="{\"semester\":${SEM},\"chunk\":${C},\"total_chunks\":${CHUNKS}}"
            done
          done
          
          MATRIX_JSON+=']}'
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: ${MATRIX_JSON}"

  # ─── Main generation jobs ─────────────────────────────────────────────────
  generate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup API Keys
        run: echo "${{ secrets.MINIMAX_API_KEYS }}" > miniall.txt

      - name: Setup Git & Branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          BRANCH_NAME="auto-notes-sem-${{ matrix.semester }}-chunk-${{ matrix.chunk }}"
          V1_BRANCH="auto-notes-sem-${{ matrix.semester }}"
          
          git fetch origin
          
          # Priority 1: Check if V2 progress branch exists (from a previous V2 run)
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            echo "Resuming from V2 progress branch: $BRANCH_NAME"
            git checkout origin/$BRANCH_NAME -- src/data/subjects/ 2>/dev/null || true
          
          # Priority 2: Check if V1 progress branch exists (from the current/old run)
          elif git show-ref --verify --quiet refs/remotes/origin/$V1_BRANCH; then
            echo "Importing progress from V1 branch: $V1_BRANCH"
            git checkout origin/$V1_BRANCH -- src/data/subjects/ 2>/dev/null || true
          
          else
            echo "Fresh run — no previous progress found."
          fi

      - name: Run Notes Generation Engine V2
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -u generate_premium_notes_v2.py \
            --semester "${{ matrix.semester }}" \
            --chunk "${{ matrix.chunk }}" \
            --total-chunks "${{ matrix.total_chunks }}" \
            --branch "${{ github.event.inputs.branches }}" \
            --max-per-key "${{ github.event.inputs.max_per_key }}"

      - name: Commit and Push Progress
        if: always()
        run: |
          BRANCH_NAME="auto-notes-sem-${{ matrix.semester }}-chunk-${{ matrix.chunk }}"
          
          # Save the generated files before switching branches
          mkdir -p /tmp/gen_output
          cp -r src/data/subjects/*-${{ matrix.semester }} /tmp/gen_output/ 2>/dev/null || true
          
          # Create or switch to the progress branch
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            git checkout -B $BRANCH_NAME origin/$BRANCH_NAME
          else
            git checkout -b $BRANCH_NAME
          fi
          
          # Restore generated files
          cp -r /tmp/gen_output/* src/data/subjects/ 2>/dev/null || true
          
          # Stage and commit
          git add src/data/subjects/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "gen(sem${{ matrix.semester }}-c${{ matrix.chunk }}): progress save" && \
             git push -u origin $BRANCH_NAME)

  # ─── Post: Checkout and merge all branches ────────────────────────────────
  post-merge:
    needs: generate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Post Checkout Code
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          echo "All generation jobs complete. Merge branches manually or via PR."
          echo ""
          echo "Generated branches:"
          git fetch origin
          git branch -r | grep "auto-notes-" | sort
