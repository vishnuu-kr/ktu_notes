name: AI Refiner Workflow

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 */2 * * *' # Run every 2 hours to process in batches

permissions:
  contents: write # Needed to push changes back to repository

jobs:
  refine-topics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI Refiner
        env:
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
        run: |
          # Only run for 1 hour maximum to prevent Action timeout, letting it commit what it finished.
          timeout 3600 python -X utf8 ai_refiner.py || true

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add perfect/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update AI perfected syllabus topics [skip ci]" && git push)
