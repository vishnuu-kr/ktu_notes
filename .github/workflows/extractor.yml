name: Run KTU Syllabus Extractor Swarm

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to push changes back to repository

jobs:
  run-swarm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pymupdf

      - name: Run Regex Extractor
        run: |
          python -X utf8 regex_extract.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/ all_subjects.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update extracted syllabus topics [skip ci]" && git push)
